<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1100" viewBox="0 0 1600 1100" fill="none">
  <defs>
    <style>
      .bg { fill: #121212; }
      .panel { fill: #161616; stroke: #d3d3d3; stroke-width: 3; }
      .soft { fill: #181818; stroke: #6f6f6f; stroke-width: 2.5; }
      .accent { stroke: #7effcc; }
      .blue { stroke: #70b7ff; }
      .amber { stroke: #f5c76d; }
      .pink { stroke: #ff8fb1; }
      .text { fill: #d3d3d3; font-family: "Virgil", "Comic Sans MS", cursive, sans-serif; font-size: 24px; }
      .small { fill: #b7b7b7; font-family: "Virgil", "Comic Sans MS", cursive, sans-serif; font-size: 18px; }
      .tiny { fill: #9f9f9f; font-family: "Virgil", "Comic Sans MS", cursive, sans-serif; font-size: 16px; }
      .title { fill: #f5f5f5; font-family: "Virgil", "Comic Sans MS", cursive, sans-serif; font-size: 40px; font-weight: 700; }
      .subtitle { fill: #7effcc; font-family: "Virgil", "Comic Sans MS", cursive, sans-serif; font-size: 22px; }
      .arrow { stroke: #d3d3d3; stroke-width: 3; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .note { fill: #1b1b1b; stroke: #ff8b8b; stroke-width: 2.5; }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M1,1 L11,6 L1,11" fill="none" stroke="#d3d3d3" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1600" height="1100"/>

  <text x="68" y="74" class="title">AnonPay architecture</text>
  <text x="70" y="108" class="subtitle">Private invoicing and checkout on Midnight</text>

  <rect class="soft" x="56" y="146" rx="26" ry="26" width="1488" height="880"/>
  <text x="84" y="186" class="small">full-stack flow: merchant creates invoice, payer settles through Midnight, backend reconciles state, dashboard + checkout stay in sync</text>

  <!-- Merchant -->
  <rect class="panel accent" x="88" y="240" rx="24" ry="24" width="300" height="212"/>
  <text x="120" y="286" class="text">Merchant</text>
  <text x="120" y="326" class="small">• Dashboard / Create Invoice</text>
  <text x="120" y="356" class="small">• Profile / Burner wallet</text>
  <text x="120" y="386" class="small">• SDK merchant / checkout creator</text>
  <text x="120" y="416" class="small">• receives payment link + receipts</text>

  <!-- Payer -->
  <rect class="panel blue" x="88" y="556" rx="24" ry="24" width="300" height="212"/>
  <text x="120" y="602" class="text">Payer</text>
  <text x="120" y="642" class="small">• opens /pay or hosted checkout</text>
  <text x="120" y="672" class="small">• connects Midnight wallet</text>
  <text x="120" y="702" class="small">• verifies invoice hash / amount</text>
  <text x="120" y="732" class="small">• authorizes shielded payment</text>

  <!-- Frontend -->
  <rect class="panel" x="484" y="212" rx="26" ry="26" width="414" height="632"/>
  <text x="520" y="258" class="text">React frontend</text>
  <text x="520" y="296" class="small">Desktop + mobile surfaces</text>
  <text x="520" y="338" class="small">• Home / Vision / Privacy / Docs</text>
  <text x="520" y="368" class="small">• Create invoice + invoice details</text>
  <text x="520" y="398" class="small">• Hosted checkout + pay page</text>
  <text x="520" y="428" class="small">• Profile QR + burner export/import</text>
  <text x="520" y="458" class="small">• Explorer + disclosure verification UI</text>

  <rect class="soft" x="520" y="514" rx="18" ry="18" width="340" height="112"/>
  <text x="542" y="548" class="small">Client-side invoice preparation</text>
  <text x="542" y="578" class="tiny">compute invoice hash + salt</text>
  <text x="542" y="602" class="tiny">encrypt memo / merchant metadata locally</text>

  <rect class="soft" x="520" y="658" rx="18" ry="18" width="340" height="140"/>
  <text x="542" y="692" class="small">Client-side payment flow</text>
  <text x="542" y="722" class="tiny">read payment link / checkout session</text>
  <text x="542" y="746" class="tiny">connect wallet SDK + build pay_invoice call</text>
  <text x="542" y="770" class="tiny">poll API / realtime state after payment</text>

  <!-- Backend -->
  <rect class="panel amber" x="968" y="178" rx="26" ry="26" width="392" height="712"/>
  <text x="1004" y="224" class="text">Node.js backend</text>
  <text x="1004" y="262" class="small">Express API + settlement logic</text>
  <text x="1004" y="304" class="small">• invoice CRUD + lookup + recent activity</text>
  <text x="1004" y="334" class="small">• checkout sessions + merchant auth</text>
  <text x="1004" y="364" class="small">• profile persistence + burner metadata</text>
  <text x="1004" y="394" class="small">• disclosure links + verify endpoint</text>
  <text x="1004" y="424" class="small">• indexer polling + webhook dispatch</text>
  <text x="1004" y="454" class="small">• relayer / proof / sponsored routes</text>

  <rect class="soft" x="1004" y="510" rx="18" ry="18" width="322" height="128"/>
  <text x="1028" y="544" class="small">Invoice creation path</text>
  <text x="1028" y="574" class="tiny">save encrypted metadata in Supabase</text>
  <text x="1028" y="598" class="tiny">optionally relay create_invoice to Midnight</text>
  <text x="1028" y="622" class="tiny">return payment link / checkout url</text>

  <rect class="soft" x="1004" y="672" rx="18" ry="18" width="322" height="162"/>
  <text x="1028" y="706" class="small">Settlement reconciliation</text>
  <text x="1028" y="736" class="tiny">poll indexer for pay_invoice txs</text>
  <text x="1028" y="760" class="tiny">match invoice_id / hash / checkout intent</text>
  <text x="1028" y="784" class="tiny">update invoice + receipts + payment intents</text>
  <text x="1028" y="808" class="tiny">dispatch merchant webhooks on settlement</text>

  <!-- Supabase -->
  <rect class="panel pink" x="1406" y="222" rx="24" ry="24" width="116" height="278"/>
  <text x="1436" y="262" class="text" transform="rotate(90 1436,262)">Supabase</text>
  <text x="1430" y="344" class="tiny" transform="rotate(90 1430,344)">invoices</text>
  <text x="1458" y="344" class="tiny" transform="rotate(90 1458,344)">merchants</text>
  <text x="1486" y="344" class="tiny" transform="rotate(90 1486,344)">payment_intents</text>
  <text x="1514" y="344" class="tiny" transform="rotate(90 1514,344)">users / disclosures</text>

  <!-- Midnight -->
  <rect class="panel accent" x="982" y="940" rx="24" ry="24" width="538" height="126"/>
  <text x="1016" y="986" class="text">Midnight network</text>
  <text x="1016" y="1022" class="small">Compact contract + wallet + indexer</text>
  <text x="1016" y="1052" class="tiny">circuits: create_invoice, pay_invoice, get_invoice_status</text>

  <!-- Optional relayer / webhooks -->
  <rect class="soft" x="1404" y="566" rx="20" ry="20" width="124" height="126"/>
  <text x="1426" y="606" class="small">Webhook</text>
  <text x="1426" y="634" class="small">targets</text>
  <text x="1426" y="664" class="tiny">merchant servers</text>

  <rect class="soft" x="1404" y="734" rx="20" ry="20" width="124" height="126"/>
  <text x="1426" y="774" class="small">Relayer /</text>
  <text x="1426" y="804" class="small">proof infra</text>
  <text x="1426" y="834" class="tiny">env-gated paths</text>

  <!-- Arrows -->
  <path class="arrow" marker-end="url(#arrow)" d="M390 320 C430 320, 450 320, 480 320"/>
  <text x="394" y="300" class="tiny">create invoice / dashboard actions</text>

  <path class="arrow" marker-end="url(#arrow)" d="M390 646 C430 646, 450 646, 480 646"/>
  <text x="394" y="626" class="tiny">open payment link / checkout</text>

  <path class="arrow" marker-end="url(#arrow)" d="M900 340 C930 340, 948 340, 964 340"/>
  <text x="706" y="318" class="tiny">POST /api/invoices, /checkout/sessions, /users/profile</text>

  <path class="arrow" marker-end="url(#arrow)" d="M902 708 C930 708, 948 708, 964 708"/>
  <text x="742" y="688" class="tiny">GET invoice data, session state, disclosure verify</text>

  <path class="arrow" marker-end="url(#arrow)" d="M1362 348 C1380 348, 1390 348, 1400 348"/>
  <text x="1262" y="324" class="tiny">persist merchant + invoice metadata</text>

  <path class="arrow" marker-end="url(#arrow)" d="M1142 894 C1142 916, 1142 926, 1142 936"/>
  <text x="1162" y="918" class="tiny">indexer polling + relayed create / payment state</text>

  <path class="arrow" marker-end="url(#arrow)" d="M1288 894 C1350 880, 1400 842, 1404 812"/>
  <text x="1254" y="874" class="tiny">sponsored / relayed routes</text>

  <path class="arrow" marker-end="url(#arrow)" d="M1362 602 C1380 610, 1390 620, 1404 628"/>
  <text x="1232" y="592" class="tiny">dispatch webhooks after settlement</text>

  <path class="arrow blue" marker-end="url(#arrow)" d="M758 800 C800 870, 906 962, 980 992"/>
  <text x="664" y="830" class="tiny">wallet authorizes pay_invoice</text>

  <path class="arrow amber" marker-end="url(#arrow)" d="M1180 638 C1180 724, 1180 842, 1180 936"/>
  <text x="1198" y="790" class="tiny">settlement updates</text>

  <!-- Notes -->
  <rect class="note" x="90" y="842" rx="18" ry="18" width="520" height="120"/>
  <text x="116" y="882" class="small">Current practical privacy split</text>
  <text x="116" y="914" class="tiny">Public on-chain state: contract lifecycle + settlement state</text>
  <text x="116" y="938" class="tiny">Off-chain app state: memo, invoice items, profiles, disclosures, receipts</text>

  <rect class="note" x="652" y="860" rx="18" ry="18" width="584" height="102"/>
  <text x="678" y="900" class="small">Important implementation detail</text>
  <text x="678" y="932" class="tiny">If the relayer is unavailable locally, AnonPay can still generate a shareable invoice link + QR, but that does not mean the invoice creation tx was registered on Midnight.</text>

  <text x="82" y="1058" class="tiny">file: assets/architecture.svg</text>
</svg>
